version: '3.8'

# Development environment with debuggers enabled
services:
  db:
    image: postgres:15-alpine
    container_name: blog-database-dev
    environment:
      POSTGRES_USER: bloguser
      POSTGRES_PASSWORD: blogpass
      POSTGRES_DB: blog_db
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloguser"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-network-dev

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: blog-backend-dev
    environment:
      - DEBUG_MODE=1
      - DATABASE_URL=postgresql://bloguser:blogpass@db:5432/blog_db
      - SECRET_KEY=dev-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://frontend:3000
    ports:
      - "8000:8000"
      - "5678:5678"  # Python debugger (debugpy)
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      db:
        condition: service_healthy
    networks:
      - blog-network-dev
    command: python -m debugpy --listen 0.0.0.0:5678 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: blog-frontend-dev
    environment:
      - DEBUG_MODE=1
      - REACT_APP_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
      - NODE_OPTIONS=--inspect-brk=0.0.0.0:9229
    ports:
      - "3000:3000"
      - "9229:9229"  # Node debugger
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - blog-network-dev
    command: npm start

networks:
  blog-network-dev:
    driver: bridge

volumes:
  postgres_data_dev:
