version: '3.8'

services:
  # PostgreSQL Database (Optional - for production use)
  db:
    image: postgres:15-alpine
    container_name: blog-database
    environment:
      POSTGRES_USER: ${DB_USER:-bloguser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-blogpass}
      POSTGRES_DB: ${DB_NAME:-blog_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bloguser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-network

  # FastAPI Backend with Debugger
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: blog-backend
    environment:
      - DEBUG_MODE=${DEBUG_MODE:-0}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./blog.db}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://frontend:3000
    ports:
      - "8000:8000"
      - "5678:5678"  # Python debugger port
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      db:
        condition: service_healthy
    networks:
      - blog-network
    command: >
      sh -c "if [ \"$DEBUG_MODE\" = \"1\" ]; 
             then python -m debugpy --listen 0.0.0.0:5678 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload; 
             else uvicorn app.main:app --host 0.0.0.0 --port 8000; 
             fi"

  # React Frontend with Debugger
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: blog-frontend
    environment:
      - DEBUG_MODE=${DEBUG_MODE:-0}
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
      - "9229:9229"  # Node debugger port
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - blog-network
    command: >
      sh -c "if [ \"$DEBUG_MODE\" = \"1\" ]; 
             then npm start; 
             else npm run build && npx serve -s build -l 3000; 
             fi"

networks:
  blog-network:
    driver: bridge

volumes:
  postgres_data:
